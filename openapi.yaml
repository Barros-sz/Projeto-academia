openapi: 3.0.3
info:
  title: API GymSystem
  description: API para gerenciamento de clientes com integração Firebase e autenticação via Token JWT.
  version: 1.0.0
  contact:
    name: Barros e João Pedro
servers:
  - url: https://--CLIENTE NA VERCEL
    description: Servidor de Produção (Vercel)
  - url: http://127.0.0.1:5000
    description: Servidor Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Insira o token obtido na rota /login para acessar rotas protegidas."

  schemas:
    Cliente:
      type: object
      properties:
        id:
          type: integer
          example: 0
        nome:
          type: string
          example: "Nome do cliente"
        cpf:
          type: string
          example: "99999999999"
        autorizado:
          type: boolean
          example: true
    
    ClienteInput:
      type: object
      required:
        - nome
        - cpf
        - autorizado
      properties:
        nome:
          type: string
          example: "Felipe Barros"
        cpf:
          type: string
          example: "99999999999"
        autorizado:
          type: boolean
          example: true

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /:
    get:
      summary: Informações da API
      responses:
        '200':
          description: Retorna metadados da API.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api: { type: string }
                  version: { type: string }
                  author: { type: string }

  /login:
    post:
      summary: Realiza login para obter token de acesso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - usuario
                - senha
              properties:
                usuario: { type: string }
                senha: { type: string }
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  token: { type: string }
        '400':
          description: Dados insuficientes
        '401':
          description: Credenciais inválidas

  /clientes:
    get:
      summary: Lista todos os clientes
      responses:
        '200':
          description: Lista de clientes cadastrados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cliente'
    
    post:
      summary: Adiciona um novo cliente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteInput'
      responses:
        '201':
          description: Cliente criado com sucesso
        '400':
          description: Dados inválidos
        '500':
          description: Erro interno no servidor

  /clientes/random:
    get:
      summary: Retorna um cliente aleatório
      responses:
        '200':
          description: Um cliente selecionado aleatoriamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '404':
          description: Nenhum cliente encontrado

  /clientes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    
    get:
      summary: Busca um cliente por ID
      responses:
        '200':
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '404':
          description: Cliente não encontrado

    put:
      summary: Atualiza um cliente (Completo)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteInput'
      responses:
        '200':
          description: Atualizado com sucesso
        '404':
          description: Cliente não encontrado

    patch:
      summary: Atualiza parcialmente um cliente
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome: { type: string }
                cpf: { type: string }
                autorizado: { type: boolean }
      responses:
        '200':
          description: Atualizado com sucesso
        '404':
          description: Cliente não encontrado

    delete:
      summary: Remove um cliente
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Apagado com sucesso
        '404':
          description: Cliente não encontrado